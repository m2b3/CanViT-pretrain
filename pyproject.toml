[project]
name = "avp-vit"
version = "0.1.0"
description = "Active Visual Pondering for Vision Transformers"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "torch",
    "torchvision",
    "omegaconf",
    "dinov3",
    "ijepa",
    "ybml",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
dinov3 = { git = "https://github.com/yberreby/dinov3.git" }
ijepa = { git = "https://github.com/yberreby/ijepa.git" }
ybml = { git = "https://github.com/yberreby/ybml.git" }

[dependency-groups]
dev = [
    "basedpyright>=1.36.1",
    "ipython>=9.8.0",
    "pytest>=9.0.2",
    "ruff>=0.14.9",
]

[tool.pytest.ini_options]
python_files = ["test.py", "test_*.py"]
testpaths = ["avp_vit", "tests"]

[tool.basedpyright]
reportMissingImports = "warning"
